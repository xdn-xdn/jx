<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>茶山驾校 · 精英班别价格表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-car-side"></i> 茶山驾校·精英班别</h1>
        <div class="sub">专业教学 · 高通过率 · 一站拿证</div>
        <div class="badge-tag"><i class="fas fa-gem"></i> 限时优惠 | 三人团报立减300</div>
    </div>
    <div class="pricing-grid" id="pricingGrid"></div>
    <footer><i class="fas fa-shield-alt"></i> 价格透明·无隐形消费 | 驾校直营保障权益</footer>
</div>

<!-- 二维码弹窗 -->
<div id="contactModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3><i class="fab fa-weixin"></i> 扫码添加微信</h3>
        <img id="wechatQr" class="qrcode-img" src="wechat_qr.jpg" alt="微信二维码">
        <div class="contact-info">
            <p><i class="fab fa-weixin"></i> 微信号：<strong id="wechatId">13662791355</strong> 
                <button class="copy-btn" data-target="wechatId">一键复制</button>
            </p>
            <p><i class="fas fa-phone-alt"></i> 咨询电话：<strong id="phoneNum">13662791355</strong> 
                <button class="copy-btn" data-target="phoneNum">一键复制</button>
            </p>
            <p style="font-size:0.75rem; color:#4a627a;">👆 点击按钮一键复制，或长按号码手动复制</p>
        </div>
    </div>
</div>

<script>
    // ========== 茶山驾校专属数据 ==========
    const WECHAT_ID = "13662791355";
    const PHONE_NUMBER = "13662791355";
    const QRCODE_IMAGE_URL = "wechat_qr.jpg";

    document.getElementById('wechatId').innerText = WECHAT_ID;
    document.getElementById('phoneNum').innerText = PHONE_NUMBER;
    document.getElementById('wechatQr').src = QRCODE_IMAGE_URL;

    // 模态框逻辑（同启信）
    const modal = document.getElementById('contactModal');
    const closeBtn = document.querySelector('.close-btn');

    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }
    closeBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if (toast) toast.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }

    function copyText(text, btn) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`✅ 已复制：${text}`);
                if (btn) { let old = btn.innerText; btn.innerText = '已复制'; setTimeout(() => btn.innerText = old, 1500); }
            }).catch(() => fallbackCopy(text, btn));
        } else { fallbackCopy(text, btn); }
    }

    function fallbackCopy(text, btn) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) {
                showToast(`✅ 已复制：${text}`);
                if (btn) { let old = btn.innerText; btn.innerText = '已复制'; setTimeout(() => btn.innerText = old, 1500); }
            } else { showToast('❌ 复制失败，请长按手动复制'); }
        } catch(e) { showToast('❌ 复制失败'); }
        document.body.removeChild(ta);
    }

    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const targetId = btn.getAttribute('data-target');
            const textEl = document.getElementById(targetId);
            if (textEl) copyText(textEl.innerText, btn);
            else showToast('❌ 未找到复制内容');
        });
    });

    // 价格卡片数据（茶山驾校，与启信一致，如需单独修改价格请在这里改）
    const plans = [
        {
            name: "经济速成班",
            price: 3180,
            original: 3980,
            badge: "性价比之选",
            badgeColor: "#3b82f6",
            features: [
    "🎯 金牌教练团队，驾考经验丰富",
    "⏰ 弹性约课，周末/夜间可选",
    "🚗 全新空调练车，舒适环境",
    "📚 提供内部理论速成题库",
    "🎁 报名即送定制学车礼包"
]
        },
        {
            name: "舒适标准班",
            price: 3980,
            original: 4980,
            badge: "🔥 热销推荐",
            badgeColor: "#f59e0b",
            features: [
    "⭐ 优选资深教练，耐心教学",
    "📅 优先预约时段，减少等待",
    "🎯 全真模拟考场体验",
    "🤝 管家式学车提醒服务",
    "🏆 毕业赠精美纪念品"
]
        },
        {
            name: "尊享VIP快班",
            price: 5980,
            original: 6980,
            badge: "⚡ 快速拿证",
            badgeColor: "#e67e22",
            features: [
    "👑 VIP专属服务通道",
    "🎓 资深教练一对一指导",
    "🕒 专属弹性练车时段",
    "📞 24小时客服优先响应",
    "🚀 考前心理辅导+重点串讲"
]
        },
        {
            name: "钻石至尊班",
            price: 8880,
            original: null,
            badge: "🌟 极致服务",
            badgeColor: "#8e44ad",
            features: [
    "💎 私人定制教学计划",
    "🚙 专车接送服务（限区域）",
    "🍃 贵宾休息室+茶歇",
    "🎁 不过重学保障（详情咨询）",
    "🤝 终身车友会会员权益"
]
        }
    ];

    const gridContainer = document.getElementById('pricingGrid');
    function renderCards() {
        let html = '';
        plans.forEach(plan => {
            html += `
                <div class="price-card">
                    <div class="card-recommend" style="background:${plan.badgeColor};">${plan.badge}</div>
                    <div class="card-header">
                        <div class="plan-name"><i class="fas fa-graduation-cap"></i><span>${plan.name}</span></div>
                        <div class="price-area">
                            <span class="current-price">¥${plan.price.toLocaleString()}<small> 起</small></span>
                            ${plan.original ? `<span class="old-price">¥${plan.original.toLocaleString()}</span>` : ''}
                        </div>
                        <div class="price-note"><i class="fas fa-receipt"></i> 一费制全包（报名+培训）</div>
                    </div>
                    <div class="features-list">
                        ${plan.features.map(f => `<div class="feature-item"><i class="fas fa-check-circle"></i><span>${f}</span></div>`).join('')}
                    </div>
                    <div class="card-footer">
                        <button class="btn-enroll" data-plan="${plan.name}"><i class="fas fa-phone-alt"></i> 立即咨询占位</button>
                    </div>
                </div>
            `;
        });
        gridContainer.innerHTML = html;
        document.querySelectorAll('.btn-enroll').forEach(btn => {
            btn.addEventListener('click', (e) => { e.preventDefault(); openModal(); });
        });
    }
    renderCards();
</script>
</body>
</html>
